services:
  starrupture:
    image: slymer29/gnp-starrupture:latest
    container_name: gnp-starrupture
    restart: unless-stopped
    ports:
      - "7777:7777/udp"
      - "27015:27015/udp"
    environment:
      GNP_TZ: "Europe/Paris"
      GNP_STEAM_APP_ID: "3809400"
      GNP_STEAM_USER: "anonymous"
      GNP_GAME_UPDATE: "true"
      GNP_FORCE_PLATFORM_WINDOWS: "true"
      GNP_WINETRICKS_RUN: "vcrun2022 dxvk sound=disabled"
      GNP_SERVER_NAME: "Mon_serveur_StarRupture"
      GNP_SERVER_PASSWORD: ""
      GNP_ADMIN_PASSWORD: "changeme"
      GNP_IP_ADDRESS: "0.0.0.0"
      GNP_GAME_PORT: "7777"
      GNP_QUERY_PORT: "27015"
      GNP_MAX_PLAYERS: "4"
      GNP_AUTO_SAVE_INTERVAL: "300"
      GNP_VERBOSE_LOGGING: "false"
      GNP_FILTER_WINE_LOGS: "true"
      GNP_EXTRA_ARGS: ""
    volumes:
      - ./data/steam:/opt/steam
      - ./data/server:/opt/games/server
      - ./data/config:/opt/games/config
      - ./data/saves:/opt/games/saves
      - ./data/backups:/opt/games/backups
      - ./data/wine:/opt/wine
